<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0f1f">
    <title>BIBEL OTD</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            overscroll-behavior-y: contain; 
            -webkit-tap-highlight-color: transparent;
        }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 2rem); }
        .pt-safe { padding-top: env(safe-area-inset-top, 1rem); }
        
        /* Custom Scrollbar für die Textareas */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body class="bg-[#0a0f1f] text-slate-200 font-sans antialiased min-h-screen selection:bg-purple-500/30">

    <!-- App Container -->
    <div class="max-w-md mx-auto min-h-screen flex flex-col bg-gradient-to-br from-[#0a0f1f] via-[#0d1326] to-[#120f26] shadow-2xl overflow-hidden relative pb-24">
        
        <!-- Header -->
        <header class="bg-[#131b2f]/60 backdrop-blur-xl border-b border-indigo-500/20 p-6 pt-safe rounded-b-[2rem] shadow-[0_0_30px_rgba(79,70,229,0.15)] z-10 sticky top-0">
            <h1 class="text-2xl font-black tracking-wider text-center text-white drop-shadow-[0_0_10px_rgba(168,85,247,0.4)]">BIBEL OTD</h1>
            <p class="text-indigo-300/80 text-center text-sm mt-1 font-medium">Merke dir deine Lieblingsverse</p>
        </header>

        <!-- Main Content (Verse Liste) -->
        <main class="flex-1 p-5 overflow-y-auto">
            <div class="flex justify-between items-center mb-5 px-1">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Deine Sammlung</h2>
                <span id="verse-count" class="text-xs font-semibold bg-indigo-500/20 border border-indigo-500/30 text-indigo-300 px-3 py-1.5 rounded-full shadow-[0_0_10px_rgba(99,102,241,0.2)]">0 Verse</span>
            </div>
            
            <div id="verse-list" class="flex flex-col gap-5">
                <!-- Verse werden hier dynamisch eingefügt -->
            </div>
        </main>

        <!-- Floating Action Button (FAB) -->
        <button id="open-modal-btn" 
            class="absolute bottom-6 right-6 w-14 h-14 bg-gradient-to-tr from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 active:scale-95 text-white rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(139,92,246,0.6)] hover:shadow-[0_0_30px_rgba(168,85,247,0.8)] transition-all duration-300 z-20 border border-white/10"
            aria-label="Vers hinzufügen">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>

        <!-- Modal: Neuen Vers hinzufügen (Bottom Sheet) -->
        <div id="add-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-30 hidden items-end justify-center transition-all duration-300">
            <div class="bg-[#0f1525]/90 backdrop-blur-2xl w-full max-w-md rounded-t-[2.5rem] p-7 pb-safe border-t border-white/10 shadow-[0_-15px_40px_rgba(139,92,246,0.25)] transform translate-y-full transition-transform duration-300 flex flex-col gap-6 max-h-[90vh] overflow-y-auto" id="modal-box">
                
                <div class="flex justify-between items-center border-b border-white/5 pb-4">
                    <h3 class="text-lg font-bold text-white tracking-wide">Neuen Vers hinzufügen</h3>
                    <button id="close-modal-btn" class="text-slate-400 hover:text-white p-2 bg-white/5 hover:bg-white/10 rounded-full active:scale-90 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>

                <form id="verse-form" class="flex flex-col gap-5">
                    <div>
                        <label for="reference" class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Bibelstelle</label>
                        <input type="text" id="reference" placeholder="z.B. Psalm 23, 1" required
                            class="w-full p-4 rounded-2xl border border-white/10 bg-white/5 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-purple-500/50 focus:bg-white/10 transition-all text-base shadow-inner">
                    </div>
                    <div>
                        <label for="text" class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Text</label>
                        <textarea id="text" placeholder="z.B. Der Herr ist mein Hirte" required rows="3"
                            class="w-full p-4 rounded-2xl border border-white/10 bg-white/5 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-purple-500/50 focus:bg-white/10 transition-all text-base resize-none shadow-inner"></textarea>
                    </div>
                    
                    <!-- Notizen Ausklapp-Bereich -->
                    <div>
                        <button type="button" onclick="document.getElementById('notes-container').classList.toggle('hidden')" class="flex items-center gap-2 text-xs font-bold text-purple-400 hover:text-purple-300 uppercase tracking-wider mb-2 transition-colors focus:outline-none">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                            Notizen hinzufügen
                        </button>
                        <div id="notes-container" class="hidden mt-3">
                            <textarea id="notes" placeholder="Deine Gedanken, Anmerkungen, ..." rows="3"
                                class="w-full p-4 rounded-2xl border border-white/10 bg-white/5 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-purple-500/50 focus:bg-white/10 transition-all text-base resize-none shadow-inner"></textarea>
                        </div>
                    </div>

                    <button type="submit" 
                        class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold py-4 px-4 rounded-2xl hover:from-indigo-500 hover:to-purple-500 active:scale-[0.98] transition-all shadow-[0_0_20px_rgba(139,92,246,0.4)] mt-2 flex justify-center items-center gap-2 border border-white/10">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                        Speichern
                    </button>
                </form>
            </div>
        </div>

        <!-- Modal: Vers bearbeiten (Bottom Sheet) -->
        <div id="edit-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-30 hidden items-end justify-center transition-all duration-300">
            <div class="bg-[#0f1525]/90 backdrop-blur-2xl w-full max-w-md rounded-t-[2.5rem] p-7 pb-safe border-t border-white/10 shadow-[0_-15px_40px_rgba(139,92,246,0.25)] transform translate-y-full transition-transform duration-300 flex flex-col gap-6 max-h-[90vh] overflow-y-auto" id="edit-modal-box">
                <div class="flex justify-between items-center border-b border-white/5 pb-4">
                    <h3 class="text-lg font-bold text-white tracking-wide">Vers bearbeiten</h3>
                    <button id="close-edit-modal-btn" class="text-slate-400 hover:text-white p-2 bg-white/5 hover:bg-white/10 rounded-full active:scale-90 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                <form id="edit-verse-form" class="flex flex-col gap-5">
                    <div>
                        <label for="edit-reference" class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Bibelstelle</label>
                        <input type="text" id="edit-reference" required
                            class="w-full p-4 rounded-2xl border border-white/10 bg-white/5 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-purple-500/50 focus:bg-white/10 transition-all text-base shadow-inner">
                    </div>
                    <div>
                        <label for="edit-text" class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Text</label>
                        <textarea id="edit-text" required rows="3"
                            class="w-full p-4 rounded-2xl border border-white/10 bg-white/5 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-purple-500/50 focus:bg-white/10 transition-all text-base resize-none shadow-inner"></textarea>
                    </div>
                    
                    <!-- Edit Notizen Bereich -->
                    <div>
                        <button type="button" onclick="document.getElementById('edit-notes-container').classList.toggle('hidden')" class="flex items-center gap-2 text-xs font-bold text-purple-400 hover:text-purple-300 uppercase tracking-wider mb-2 transition-colors focus:outline-none">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                            Notizen bearbeiten
                        </button>
                        <div id="edit-notes-container" class="hidden mt-3">
                            <textarea id="edit-notes" placeholder="Deine Gedanken, Anmerkungen..." rows="3"
                                class="w-full p-4 rounded-2xl border border-white/10 bg-white/5 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-purple-500/50 focus:bg-white/10 transition-all text-base resize-none shadow-inner"></textarea>
                        </div>
                    </div>

                    <button type="submit" 
                        class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold py-4 px-4 rounded-2xl hover:from-indigo-500 hover:to-purple-500 active:scale-[0.98] transition-all shadow-[0_0_20px_rgba(139,92,246,0.4)] mt-2 flex justify-center items-center gap-2 border border-white/10">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                        Aktualisieren
                    </button>
                </form>
            </div>
        </div>

        <!-- Detailansicht (Full Page Slide-In) -->
        <div id="detail-view" class="fixed inset-0 bg-gradient-to-br from-[#0a0f1f] via-[#0d1326] to-[#120f26] z-50 hidden flex-col transition-transform duration-300 transform translate-x-full">
            <header class="p-6 pt-safe flex items-center justify-between border-b border-white/5 bg-[#131b2f]/80 backdrop-blur-2xl shadow-[0_4px_30px_rgba(0,0,0,0.5)]">
                <button onclick="closeDetailView()" class="text-slate-400 hover:text-white p-2 bg-white/5 hover:bg-white/10 rounded-full active:scale-90 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </button>
                <div class="text-sm font-bold text-slate-300 uppercase tracking-widest">Detailansicht</div>
                <div class="w-10"></div> <!-- Spacer for centering -->
            </header>
            
            <main class="flex-1 p-7 overflow-y-auto pb-safe">
                <!-- Hauptvers -->
                <h2 id="dv-text" class="text-3xl font-black text-white leading-snug mb-4 drop-shadow-md"></h2>
                
                <!-- Bibelstelle -->
                <p id="dv-reference" class="text-purple-400 italic text-xl font-medium mb-8"></p>
                
                <!-- Trennlinie -->
                <div class="h-px w-full bg-gradient-to-r from-transparent via-white/10 to-transparent mb-8"></div>
                
                <!-- Infos / Metadaten -->
                <div class="flex flex-col gap-6">
                    <div class="flex flex-col gap-2">
                        <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">Hinzugefügt am</span>
                        <div class="flex items-center gap-3">
                            <svg class="text-slate-400" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                            <span id="dv-date" class="text-base text-slate-300 font-medium"></span>
                        </div>
                    </div>

                    <!-- Notizen Bereich -->
                    <div id="dv-notes-container" class="flex flex-col gap-2 hidden mt-2">
                        <span class="text-xs font-bold text-purple-400/80 uppercase tracking-wider flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                            Notizen
                        </span>
                        <div class="bg-[#131b2f]/50 border border-white/5 rounded-2xl p-5 shadow-inner relative">
                            <p id="dv-notes-text" class="text-slate-300 leading-relaxed text-base font-light whitespace-pre-wrap line-clamp-3 transition-all duration-300"></p>
                            <button id="dv-notes-toggle" onclick="toggleNotes()" class="hidden text-purple-400 hover:text-purple-300 text-sm font-bold mt-3 transition-colors uppercase tracking-wider flex items-center gap-1">
                                Mehr anzeigen <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <!-- Custom Delete Dialog (Modal) -->
        <div id="delete-modal" class="fixed inset-0 bg-black/70 backdrop-blur-md z-[60] hidden items-center justify-center p-4">
            <div class="bg-[#121929]/95 border border-white/10 backdrop-blur-2xl w-full max-w-xs rounded-[2rem] p-7 shadow-[0_0_40px_rgba(0,0,0,0.5)] text-center flex flex-col gap-5">
                <div class="w-16 h-16 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center mx-auto border border-red-500/20 shadow-[0_0_20px_rgba(239,68,68,0.2)]">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                </div>
                <div>
                    <h4 class="font-bold text-white text-xl">Vers löschen?</h4>
                    <p class="text-sm text-slate-400 mt-2">Bist du sicher? Dieser Vers geht unwiderruflich verloren.</p>
                </div>
                <div class="flex gap-3 mt-3">
                    <button id="cancel-delete-btn" class="flex-1 bg-white/5 hover:bg-white/10 border border-white/10 text-slate-300 font-semibold py-3.5 px-4 rounded-xl transition-all">Abbrechen</button>
                    <button id="confirm-delete-btn" class="flex-1 bg-red-600/90 hover:bg-red-500 text-white font-semibold py-3.5 px-4 rounded-xl transition-all shadow-[0_0_15px_rgba(220,38,38,0.4)] border border-red-400/30">Löschen</button>
                </div>
            </div>
        </div>

    </div>

    <!-- JavaScript Logik -->
    <script>
        // DOM Elemente
        const form = document.getElementById('verse-form');
        const list = document.getElementById('verse-list');
        const refInput = document.getElementById('reference');
        const textInput = document.getElementById('text');
        const notesInput = document.getElementById('notes');
        const countBadge = document.getElementById('verse-count');

        // Modal Elemente
        const addModal = document.getElementById('add-modal');
        const modalBox = document.getElementById('modal-box');
        const openModalBtn = document.getElementById('open-modal-btn');
        const closeModalBtn = document.getElementById('close-modal-btn');

        // Edit Modal Elemente
        const editModal = document.getElementById('edit-modal');
        const editModalBox = document.getElementById('edit-modal-box');
        const closeEditModalBtn = document.getElementById('close-edit-modal-btn');
        const editForm = document.getElementById('edit-verse-form');
        const editRefInput = document.getElementById('edit-reference');
        const editTextInput = document.getElementById('edit-text');
        const editNotesInput = document.getElementById('edit-notes');
        const editNotesContainer = document.getElementById('edit-notes-container');
        let indexToEdit = null;

        // Detail View Elemente
        const detailView = document.getElementById('detail-view');
        const dvText = document.getElementById('dv-text');
        const dvRef = document.getElementById('dv-reference');
        const dvDate = document.getElementById('dv-date');
        const dvNotesContainer = document.getElementById('dv-notes-container');
        const dvNotesText = document.getElementById('dv-notes-text');
        const dvNotesToggle = document.getElementById('dv-notes-toggle');
        let isNotesExpanded = false;

        // Delete Dialog Elemente
        const deleteModal = document.getElementById('delete-modal');
        const confirmDeleteBtn = document.getElementById('confirm-delete-btn');
        const cancelDeleteBtn = document.getElementById('cancel-delete-btn');
        let indexToDelete = null;

        // Daten aus localStorage laden
        let verses = JSON.parse(localStorage.getItem('bibelOtdData')) || [];

        // --- Modals Logic ---
        function openModal() {
            addModal.classList.remove('hidden');
            addModal.classList.add('flex');
            document.getElementById('notes-container').classList.add('hidden'); // Reset notes toggle
            setTimeout(() => { modalBox.classList.remove('translate-y-full'); }, 10);
            refInput.focus();
        }

        function closeModal() {
            modalBox.classList.add('translate-y-full');
            setTimeout(() => {
                addModal.classList.remove('flex');
                addModal.classList.add('hidden');
                form.reset();
            }, 300);
        }

        openModalBtn.addEventListener('click', openModal);
        closeModalBtn.addEventListener('click', closeModal);
        addModal.addEventListener('click', (e) => { if (e.target === addModal) closeModal(); });

        // --- Detail View Logic ---
        window.openDetailView = function(index) {
            const verse = verses[index];
            dvText.textContent = verse.text;
            dvRef.textContent = verse.reference;
            dvDate.textContent = verse.date;

            if (verse.notes && verse.notes.trim() !== '') {
                dvNotesContainer.classList.remove('hidden');
                dvNotesContainer.classList.add('flex');
                dvNotesText.textContent = verse.notes;
                
                // Toggle-Button anzeigen, falls Text lang ist
                dvNotesText.classList.add('line-clamp-3');
                isNotesExpanded = false;
                dvNotesToggle.innerHTML = `Mehr anzeigen <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>`;
                
                // Timeout nötig für korrekte ScrollHeight Berechnung
                setTimeout(() => {
                    if (dvNotesText.scrollHeight > dvNotesText.clientHeight) {
                        dvNotesToggle.classList.remove('hidden');
                        dvNotesToggle.classList.add('flex');
                    } else {
                        dvNotesToggle.classList.add('hidden');
                        dvNotesToggle.classList.remove('flex');
                    }
                }, 10);
            } else {
                dvNotesContainer.classList.add('hidden');
                dvNotesContainer.classList.remove('flex');
            }

            detailView.classList.remove('hidden');
            detailView.classList.add('flex');
            setTimeout(() => { detailView.classList.remove('translate-x-full'); }, 10);
        };

        window.closeDetailView = function() {
            detailView.classList.add('translate-x-full');
            setTimeout(() => { 
                detailView.classList.remove('flex');
                detailView.classList.add('hidden'); 
            }, 300);
        };

        window.toggleNotes = function() {
            isNotesExpanded = !isNotesExpanded;
            if (isNotesExpanded) {
                dvNotesText.classList.remove('line-clamp-3');
                dvNotesToggle.innerHTML = `Weniger anzeigen <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>`;
            } else {
                dvNotesText.classList.add('line-clamp-3');
                dvNotesToggle.innerHTML = `Mehr anzeigen <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>`;
            }
        };

        // --- Edit Modal Logik ---
        window.openEditModal = function(index, event) {
            event.stopPropagation(); // Verhindert Klick auf die Karte
            document.getElementById(`menu-${index}`).classList.add('hidden');
            
            indexToEdit = index;
            const verse = verses[index];
            editRefInput.value = verse.reference;
            editTextInput.value = verse.text;
            editNotesInput.value = verse.notes || '';

            if (verse.notes && verse.notes.trim() !== '') {
                editNotesContainer.classList.remove('hidden');
            } else {
                editNotesContainer.classList.add('hidden');
            }

            editModal.classList.remove('hidden');
            editModal.classList.add('flex');
            setTimeout(() => { editModalBox.classList.remove('translate-y-full'); }, 10);
        };

        function closeEditModal() {
            editModalBox.classList.add('translate-y-full');
            setTimeout(() => {
                editModal.classList.remove('flex');
                editModal.classList.add('hidden');
                editForm.reset();
                indexToEdit = null;
            }, 300);
        }

        closeEditModalBtn.addEventListener('click', closeEditModal);
        editModal.addEventListener('click', (e) => { if (e.target === editModal) closeEditModal(); });

        editForm.addEventListener('submit', (e) => {
            e.preventDefault();
            if (indexToEdit !== null) {
                verses[indexToEdit].reference = editRefInput.value.trim();
                verses[indexToEdit].text = editTextInput.value.trim();
                verses[indexToEdit].notes = editNotesInput.value.trim();
                saveData();
                renderVerses();
                closeEditModal();
                
                // Falls Detail View offen ist, updaten
                if(!detailView.classList.contains('hidden')) {
                    openDetailView(indexToEdit);
                }
            }
        });

        // --- 3-Dot Menu Logik ---
        window.toggleMenu = function(index, event) {
            event.stopPropagation();
            const menu = document.getElementById(`menu-${index}`);
            document.querySelectorAll('[id^="menu-"]').forEach(m => {
                if(m.id !== `menu-${index}`) m.classList.add('hidden');
            });
            menu.classList.toggle('hidden');
        };

        document.addEventListener('click', () => {
            document.querySelectorAll('[id^="menu-"]').forEach(m => m.classList.add('hidden'));
        });

        // --- Render List ---
        function renderVerses() {
            list.innerHTML = '';
            countBadge.textContent = `${verses.length} ${verses.length === 1 ? 'Vers' : 'Verse'}`;
            
            if (verses.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-20 px-4 flex flex-col items-center">
                        <div class="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center mb-5 border border-white/10 shadow-[0_0_20px_rgba(255,255,255,0.02)]">
                            <svg class="w-10 h-10 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                        </div>
                        <p class="text-base font-semibold text-slate-300">Deine Sammlung ist leer</p>
                        <p class="text-xs text-slate-500 mt-2 max-w-xs mx-auto">Tippe unten rechts auf das "+", um deinen ersten Lieblingsvers hinzuzufügen.</p>
                    </div>
                `;
                return;
            }

            [...verses].reverse().forEach((verse, reversedIndex) => {
                const originalIndex = verses.length - 1 - reversedIndex;
                
                const card = document.createElement('div');
                card.className = "bg-[#131b2f]/50 backdrop-blur-lg border border-white/5 shadow-[0_4px_20px_rgba(0,0,0,0.3)] p-5 rounded-2xl relative group transition-all duration-300 hover:shadow-[0_0_25px_rgba(124,58,237,0.15)] hover:border-purple-500/20 cursor-pointer active:scale-[0.98]";
                card.onclick = () => openDetailView(originalIndex);
                
                // Check if notes exist to show tiny icon
                const notesIcon = (verse.notes && verse.notes.trim() !== '') ? 
                    `<svg class="text-purple-400 inline-block ml-2" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>` : '';

                card.innerHTML = `
                    <div class="pr-8 mb-2">
                        <p class="text-xl font-bold text-white leading-snug mb-2 line-clamp-3">${escapeHTML(verse.text)}</p>
                        <p class="text-purple-400 italic text-sm font-medium flex items-center">${escapeHTML(verse.reference)} ${notesIcon}</p>
                    </div>
                    
                    <button onclick="toggleMenu(${originalIndex}, event)" class="absolute top-4 right-3 text-slate-400 hover:text-white p-2 rounded-xl hover:bg-white/10 active:scale-90 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
                    </button>

                    <div id="menu-${originalIndex}" class="hidden absolute top-12 right-4 bg-[#1a2235] border border-white/10 shadow-2xl rounded-xl w-40 overflow-hidden z-10">
                        <button onclick="openEditModal(${originalIndex}, event)" class="w-full text-left px-4 py-3 text-sm text-slate-300 hover:bg-white/5 hover:text-white transition-colors border-b border-white/5 flex items-center gap-3">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                            Bearbeiten
                        </button>
                        <button onclick="requestDelete(${originalIndex}, event)" class="w-full text-left px-4 py-3 text-sm text-red-400 hover:bg-red-500/10 hover:text-red-300 transition-colors flex items-center gap-3">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                            Löschen
                        </button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        // Hilfsfunktion gegen HTML-Injection
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag])
            );
        }

        // Neuen Vers speichern
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const today = new Date();
            const dateString = today.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });

            const newVerse = {
                reference: refInput.value.trim(),
                text: textInput.value.trim(),
                notes: notesInput.value.trim(),
                date: dateString
            };

            verses.push(newVerse);
            saveData();
            renderVerses();
            closeModal();
        });

        // Löschen anfordern
        window.requestDelete = function(index, event) {
            if(event) event.stopPropagation();
            
            const menu = document.getElementById(`menu-${index}`);
            if (menu) menu.classList.add('hidden');

            indexToDelete = index;
            deleteModal.classList.remove('hidden');
            deleteModal.classList.add('flex');
        };

        cancelDeleteBtn.addEventListener('click', () => {
            deleteModal.classList.remove('flex');
            deleteModal.classList.add('hidden');
            indexToDelete = null;
        });

        confirmDeleteBtn.addEventListener('click', () => {
            if (indexToDelete !== null) {
                verses.splice(indexToDelete, 1);
                saveData();
                renderVerses();
            }
            deleteModal.classList.remove('flex');
            deleteModal.classList.add('hidden');
            indexToDelete = null;
        });

        function saveData() {
            localStorage.setItem('bibelOtdData', JSON.stringify(verses));
        }

        renderVerses();

    </script>
</body>
</html>
